services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sehatsetara
      POSTGRES_USER: sehatsetara
      POSTGRES_PASSWORD: sehatsetara
    volumes:
      - sehatsetara_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sehatsetara -d sehatsetara"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://sehatsetara:sehatsetara@db:5432/sehatsetara
      JWT_SECRET: sehatsetara-secret
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      args:
        VITE_API_BASE_URL: /api
    depends_on:
      - backend
    ports:
      - "127.0.0.1:8081:80"

volumes:
  sehatsetara_pgdata:
